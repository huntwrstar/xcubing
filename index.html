<script>

    const state = {
        currentPage: 'home',
        meta: null,
        season: { project: '333', type: 'single', scope: 'country:China', gender: 'all', continent: '', country: 'China' },
        active: { project: '333', type: 'single', scope: 'country:China', gender: 'all', continent: '', country: 'China' },
        region: { 
            project: '333', type: 'single', period: 'historical', 
            province: '北京', city: '全部城市', gender: 'all',
            allProvinces: [],
            provinceCities: {}
        },
        comprehensive: { 
            source: 'season',
            subDataset: 'historical',
            scope: 'country:China',
            selectedEvents: ['333'],
            gender: 'all',
            province: '',
            city: '全部城市',
            type: 'single',
            rankedData: [],
            currentPage: 1
        },
        record: {
            province: '北京',
            city: '全部城市',
            gender: 'all',
            allProvinces: [],
            provinceCities: {},
            rawDataByProject: {},
            dataLoaded: false,
            loading: false
        },
        pagination: { currentPage: 1, totalPages: 1, data: [] },
        tooltipTimer: null
    };

    const MUNICIPALITIES = ['北京', '上海', '重庆', '天津', '台湾', '香港', '澳门', '神手谷'];

 
    const PROJECT_LIST = [
        {code:'333', name:'三阶'},{code:'222', name:'二阶'},{code:'444', name:'四阶'},{code:'555', name:'五阶'},
        {code:'666', name:'六阶'},{code:'777', name:'七阶'},{code:'333bf', name:'三盲'},{code:'333fm', name:'最少步'},
        {code:'333oh', name:'单手'},{code:'clock', name:'魔表'},{code:'minx', name:'五魔方'},{code:'pyram', name:'金字塔'},
        {code:'skewb', name:'斜转'},{code:'sq1', name:'SQ1'},{code:'444bf', name:'四盲'},{code:'555bf', name:'五盲'},
        {code:'333mbf', name:'多盲'}
    ];

    async function fetchJSON(url) {
        console.log(`开始加载: ${url}`);
        const res = await fetch(url);
        if (!res.ok) {
            console.error(`加载失败: ${url} 状态码 ${res.status}`);
            throw new Error(`加载失败: ${url}`);
        }
        const data = await res.json();
        if (Array.isArray(data)) {
            console.log(`加载成功: ${url} 共 ${data.length} 条记录`);
            if (data.length > 0) {
                console.log('第一条数据示例:', data[0]);
            } else {
                console.warn(`警告: ${url} 返回空数组`);
            }
            data.forEach(item => {
                if (item.result === undefined || item.result === null) {
                    item.result = 'DNF';
                }
            });
        } else {
            console.log(`加载成功: ${url} (对象)`);
        }
        return data;
    }

    function showPageLoading(page) {
        const tbody = document.getElementById(`${page}-tbody`);
        if (!tbody) return;
        let colspan = 6; // 默认
        if (page === 'region') {
            colspan = 7;
        } else if (page === 'season' || page === 'active') {
            colspan = 6;
        } else if (page === 'comprehensive') {
            const source = state.comprehensive.source;
            colspan = source === 'province' ? 6 : 5;
        } else if (page === 'record') {
            colspan = 5;
        }
        tbody.innerHTML = `<tr><td colspan="${colspan}" class="loading-cell"><i class="fas fa-spinner"></i> 加载中<span class="loading-dots"></span></td></tr>`;
    }

    function formatResultForSort(resultStr) {
        if (resultStr === undefined || resultStr === null || resultStr === '') return Infinity;
        if (resultStr === 'DNF' || resultStr === '暂无') return Infinity;
        if (typeof resultStr === 'string' && resultStr.includes(':')) {
            const parts = resultStr.split(':');
            return parseFloat(parts[0]) * 60 + parseFloat(parts[1]);
        }
        return parseFloat(resultStr);
    }

    function parseTime(timeStr) {
        return formatResultForSort(timeStr);
    }

    function formatResult(resultStr) {
        if (!resultStr || resultStr === 'DNF' || resultStr === '暂无') return '暂无';
        if (/^\d+$/.test(String(resultStr).trim())) {
            return resultStr;
        }
        if (typeof resultStr === 'string' && (resultStr.includes(':') || resultStr.includes('.')) && !/^\d+$/.test(resultStr)) {
            return resultStr;
        }
        const num = parseFloat(resultStr);
        if (isNaN(num) || num <= 0) return '暂无';
        const totalSeconds = num / 100;
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = (totalSeconds % 60).toFixed(2);
        if (minutes > 0) {
            return `${minutes}:${seconds.padStart(5, '0')}`;
        } else {
            return seconds;
        }
    }

    function extractChineseName(name) {
        if (name && name.includes('(') && name.includes(')')) {
            const match = name.match(/\(([^)]+)\)/);
            if (match) {
                const inside = match[1].trim();
                if (/[\u4e00-\u9fa5]/.test(inside)) {
                    return inside;
                }
            }
        }
        return name;
    }

    function getDisplayName(item) {
        const name = item.name || '';
        const isChinese = (item.country === 'China') || (item.province);
        if (isChinese) {
            return extractChineseName(name);
        }
        return name;
    }

    function recomputeRanks(data) {
        data = data.filter(item => item && item.result !== undefined);
        console.log(`recomputeRanks: 过滤后数据 ${data.length} 条`);
        data.sort((a,b) => parseTime(a.result) - parseTime(b.result));
        let rank = 1, lastResult = null, sameCount = 0;
        return data.map((item, idx) => {
            const res = item.result;
            if (idx === 0) {
                lastResult = res;
                return { ...item, rank: rank };
            }
            if (res === lastResult) {
                sameCount++;
                return { ...item, rank: rank };
            } else {
                rank += 1 + sameCount;
                sameCount = 0;
                lastResult = res;
                return { ...item, rank: rank };
            }
        });
    }

    function paginate(data, page, pageSize = 100) {
        const start = (page - 1) * pageSize;
        return data.slice(start, start + pageSize);
    }

    function renderPagination(containerId, totalPages, currentPage, callback) {
        const container = document.getElementById(containerId);
        if (!container) return;
        if (totalPages <= 1) {
            container.innerHTML = '';
            return;
        }
        let html = '<ul class="pagination">';
        const prevDisabled = currentPage === 1 ? 'disabled' : '';
        html += `<li class="${prevDisabled}"><a href="#" data-page="${currentPage-1}"><i class="fa fa-angle-left"></i> 前页</a></li>`;
        const maxVisible = 8;
        let start = Math.max(1, currentPage - Math.floor(maxVisible/2));
        let end = Math.min(totalPages, start + maxVisible - 1);
        if (end - start + 1 < maxVisible) {
            start = Math.max(1, end - maxVisible + 1);
        }
        if (start > 1) {
            html += `<li><a href="#" data-page="1">1</a></li>`;
            if (start > 2) html += `<li class="disabled"><span>...</span></li>`;
        }
        for (let i = start; i <= end; i++) {
            const active = i === currentPage ? 'active' : '';
            html += `<li class="${active}"><a href="#" data-page="${i}">${i}</a></li>`;
        }
        if (end < totalPages) {
            if (end < totalPages - 1) html += `<li class="disabled"><span>...</span></li>`;
            html += `<li><a href="#" data-page="${totalPages}">${totalPages}</a></li>`;
        }
        const nextDisabled = currentPage === totalPages ? 'disabled' : '';
        html += `<li class="${nextDisabled}"><a href="#" data-page="${currentPage+1}">后页 <i class="fa fa-angle-right"></i></a></li>`;
        html += '</ul>';
        container.innerHTML = html;

        container.querySelectorAll('a[data-page]').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const page = parseInt(link.dataset.page);
                if (!isNaN(page) && page >= 1 && page <= totalPages && page !== currentPage) {
                    callback(page);
                }
            });
        });
    }

    async function calculateComprehensive() {
        if (state.currentPage !== 'comprehensive') return;

        const startTime = Date.now();
        const loadingDiv = document.getElementById('comp-loading');
        const tbody = document.getElementById('comp-tbody');
        const paginationDiv = document.getElementById('comp-pagination');

        if (loadingDiv) loadingDiv.style.display = 'block';
        if (tbody) tbody.innerHTML = '';
        if (paginationDiv) paginationDiv.innerHTML = '';

        await new Promise(resolve => setTimeout(resolve, 0));

        updateCompCurrentLabel();

        const { source, subDataset, scope, selectedEvents, gender, province, city, type } = state.comprehensive;
        if (selectedEvents.length === 0) {
            if (loadingDiv) loadingDiv.style.display = 'none';
            if (tbody) tbody.innerHTML = '<tr><td colspan="5">请至少选择一个项目</td></tr>';
            return;
        }

        const projectDataMap = {};
        const personInfoMap = new Map();

        console.log(`综合排名开始计算，数据源: ${source}, 子类型: ${subDataset}, 项目: ${selectedEvents.join(',')}`);

        for (let proj of selectedEvents) {
            try {
                let basePath;
                if (source === 'season') basePath = `data/season/${type}`;
                else if (source === 'active') basePath = `data/active/${type}`;
                else basePath = `data/region/${subDataset}/${type}`;

                const url = `${basePath}/${proj}.json`;
                console.log(`加载项目 ${proj} 数据: ${url}`);
                let data = await fetchJSON(url);

                if (gender !== 'all') {
                    data = data.filter(d => d.gender === gender);
                    console.log(`项目 ${proj} 性别筛选后: ${data.length}`);
                }

                if (source !== 'province') {
                    const [scopeType, scopeValue] = scope.split(':');
                    if (scopeType === 'continent') {
                        data = data.filter(d => applyContinentFilter(d.country, scopeValue));
                        console.log(`项目 ${proj} 范围筛选(洲)后: ${data.length}`);
                    } else if (scopeType === 'country') {
                        data = data.filter(d => d.country === scopeValue);
                        console.log(`项目 ${proj} 范围筛选(国家)后: ${data.length}`);
                    }
                } else {
                    if (province) {
                        data = data.filter(d => d.province === province);
                        console.log(`项目 ${proj} 省份筛选后: ${data.length}`);
                    }
                    if (city !== '全部城市' && city) {
                        data = data.filter(d => d.city === city);
                        console.log(`项目 ${proj} 城市筛选后: ${data.length}`);
                    }
                }

                data.forEach(d => {
                    const id = d.wcaid;
                    if (!personInfoMap.has(id)) {
                        personInfoMap.set(id, {
                            name: d.name,
                            country: d.country || '中国',
                            province: d.province || '',
                            city: d.city || ''
                        });
                    }
                });

                const ranked = recomputeRanks(data);
                const rankMap = {};
                ranked.forEach(item => {
                    rankMap[item.wcaid] = item.rank;
                });
                projectDataMap[proj] = {
                    rankMap: rankMap,
                    maxRank: data.length
                };
                console.log(`项目 ${proj} 处理完成，有效选手数: ${data.length}, 最大排名: ${data.length}`);
            } catch (e) {
                console.warn(`加载项目 ${proj} 失败`, e);
                projectDataMap[proj] = {
                    rankMap: {},
                    maxRank: 0
                };
            }
        }

        const results = [];
        for (let [wcaid, info] of personInfoMap.entries()) {
            let totalRank = 0;
            let count = 0;
            for (let proj of selectedEvents) {
                const projData = projectDataMap[proj];
                if (projData.rankMap[wcaid]) {
                    totalRank += projData.rankMap[wcaid];
                    count++;
                } else {
                    totalRank += (projData.maxRank + 1);
                }
            }
            if (count > 0) {
                results.push({
                    wcaid: wcaid,
                    name: info.name,
                    country: info.country,
                    province: info.province,
                    city: info.city,
                    totalRank: totalRank,
                    eventCount: count
                });
            }
        }

        console.log(`综合排名计算完成，共有 ${results.length} 名选手`);

        results.sort((a, b) => a.totalRank - b.totalRank);

        let rank = 1, lastTotal = null, sameCount = 0;
        const rankedResults = results.map((item, idx) => {
            if (idx === 0) {
                lastTotal = item.totalRank;
                return { ...item, displayRank: rank };
            }
            if (item.totalRank === lastTotal) {
                sameCount++;
                return { ...item, displayRank: rank };
            } else {
                rank += 1 + sameCount;
                sameCount = 0;
                lastTotal = item.totalRank;
                return { ...item, displayRank: rank };
            }
        });

        const elapsed = Date.now() - startTime;
        if (elapsed < 500) {
            await new Promise(resolve => setTimeout(resolve, 500 - elapsed));
        }

        if (loadingDiv) loadingDiv.style.display = 'none';

        renderComprehensiveTable(rankedResults);
    }

    function applyContinentFilter(country, continent) {
        const countryContinent = state.meta?.country_continent || {};
        return countryContinent[country] === continent;
    }

    async function loadAllRecordsData() {
        if (state.record.dataLoaded) return;
        state.record.loading = true;

        const rawDataByProject = {};
        PROJECT_LIST.forEach(p => {
            rawDataByProject[p.code] = { single: [], average: [] };
        });

        const singlePromises = PROJECT_LIST.map(p =>
            fetchJSON(`data/region/historical/single/${p.code}.json`).catch(() => [])
        );
        const avgPromises = PROJECT_LIST.map(p =>
            fetchJSON(`data/region/historical/average/${p.code}.json`).catch(() => [])
        );

        try {
            const singles = await Promise.all(singlePromises);
            const averages = await Promise.all(avgPromises);

            PROJECT_LIST.forEach((p, idx) => {
                rawDataByProject[p.code].single = singles[idx] || [];
                rawDataByProject[p.code].average = averages[idx] || [];
            });

            state.record.rawDataByProject = rawDataByProject;

            const provinceSet = new Set();
            for (let proj in rawDataByProject) {
                ['single', 'average'].forEach(type => {
                    rawDataByProject[proj][type].forEach(item => {
                        if (item.province) provinceSet.add(item.province);
                    });
                });
            }
            state.record.allProvinces = Array.from(provinceSet).sort((a,b) => a.localeCompare(b, 'zh'));
            state.record.dataLoaded = true;
            console.log('省市纪录原始数据加载完成，省份列表：', state.record.allProvinces);
        } catch (e) {
            console.error('加载省市纪录原始数据失败', e);
        } finally {
            state.record.loading = false;
        }
    }

    function computeBestForFilters(province, city, gender) {
        const result = {};
        for (let proj of PROJECT_LIST) {
            const singleBest = { value: Infinity, record: null };
            const avgBest = { value: Infinity, record: null };

            const singleList = state.record.rawDataByProject[proj.code]?.single || [];
            singleList.forEach(item => {
                if (item.province !== province) return;
                if (city !== '全部城市' && item.city !== city) return;
                if (gender !== 'all' && item.gender !== gender) return;

                const val = parseTime(item.result);
                if (val < singleBest.value) {
                    singleBest.value = val;
                    singleBest.record = {
                        result: item.result,
                        name: item.name,
                        competition: item.competition,
                        date: item.date,
                        wcaid: item.wcaid
                    };
                } else if (val === singleBest.value && singleBest.record) {
                    if (item.date && singleBest.record.date && item.date < singleBest.record.date) {
                        singleBest.record = { ...item };
                    }
                }
            });

            const avgList = state.record.rawDataByProject[proj.code]?.average || [];
            avgList.forEach(item => {
                if (item.province !== province) return;
                if (city !== '全部城市' && item.city !== city) return;
                if (gender !== 'all' && item.gender !== gender) return;

                const val = parseTime(item.result);
                if (val < avgBest.value) {
                    avgBest.value = val;
                    avgBest.record = {
                        result: item.result,
                        name: item.name,
                        competition: item.competition,
                        date: item.date,
                        wcaid: item.wcaid
                    };
                } else if (val === avgBest.value && avgBest.record) {
                    if (item.date && avgBest.record.date && item.date < avgBest.record.date) {
                        avgBest.record = { ...item };
                    }
                }
            });

            result[proj.code] = {
                single: singleBest.record,
                average: avgBest.record
            };
        }
        return result;
    }

        let displayCity = (city === '全部城市') ? '全省' : city;

                    </tr>`;
                }
            }
        }
        tbody.innerHTML = html || '<tr><td colspan="5">暂无数据</td></tr>';
    }

    function bindEvents(page, autoLoad = true) {
        const prefix = page === 'comprehensive' ? 'comp' : page;
        if (page !== 'comprehensive') {
            const projSelect = document.getElementById(`${prefix}-project`);
            if (projSelect) {
                projSelect.addEventListener('change', (e) => {
                    state[page].project = e.target.value;
                });
            }

        const genderSelect = document.getElementById(`${prefix}-gender`);
        if (genderSelect) {
            genderSelect.addEventListener('change', (e) => {
                state[page].gender = e.target.value;
            });
        }
        if (prefix !== 'region' && page !== 'comprehensive') {
            const scopeSelect = document.getElementById(`${prefix}-scope`);
            if (scopeSelect) {
                scopeSelect.addEventListener('change', (e) => {
                    const val = e.target.value;
                    if (val.startsWith('continent:')) {
                        state[page].continent = val.split(':')[1];
                        state[page].country = '';
                    } else if (val.startsWith('country:')) {
                        state[page].country = val.split(':')[1];
                        state[page].continent = '';
                    } else {
                        state[page].continent = '';
                        state[page].country = '';
                    }
                });
            }
        }
        if (page !== 'comprehensive') {
            const singleBtn = document.getElementById(`${prefix}-single`);
            const avgBtn = document.getElementById(`${prefix}-average`);
            if (singleBtn) {
                singleBtn.addEventListener('click', () => {
                    setType(page, 'single');
                    loadPageData(page);
                });
            }
            if (avgBtn) {
                avgBtn.addEventListener('click', () => {
                    setType(page, 'average');
                    loadPageData(page);
                });
            }
        }
    }

        const singleBtn = document.getElementById(`${prefix}-single`);
        const avgBtn = document.getElementById(`${prefix}-average`);
        if (type === 'single') {
            singleBtn?.classList.add('btn-warning');
            singleBtn?.classList.remove('btn-primary');
            avgBtn?.classList.add('btn-primary');
            avgBtn?.classList.remove('btn-warning');

            avgBtn?.classList.remove('btn-primary');
            singleBtn?.classList.add('btn-primary');
            singleBtn?.classList.remove('btn-warning');
        }

    function applyGenderFilter(data, gender) {
        if (gender === 'all') return data;
        return data.filter(d => d.gender === gender);
    }

    function applyScopeFilter(data, continent, country) {
        if (continent) {
            const countryContinent = state.meta?.country_continent || {};
            return data.filter(d => countryContinent[d.country] === continent);
        } else if (country) {
            return data.filter(d => d.country === country);
        }
        return data;
    }

    function renderTable(page, data) {
        const tbody = document.getElementById(`${page}-tbody`);
        if (!tbody) {
            console.warn(`表格体 ${page}-tbody 不存在，无法渲染`);
            return;
        }

        const ranked = recomputeRanks(data);
        console.log(`渲染表格 ${page}, 排名后数据条数: ${ranked.length}`);

        state.pagination.data = ranked;
        state.pagination.totalPages = Math.ceil(ranked.length / 100);
        state.pagination.currentPage = 1;

        const pageData = paginate(ranked, 1);
        renderTableBody(tbody, pageData, page === 'region');

        const onPageChange = (newPage) => {
            state.pagination.currentPage = newPage;
            const newPageData = paginate(ranked, newPage);
            renderTableBody(tbody, newPageData, page === 'region');
            renderPagination(`${page}-pagination`, state.pagination.totalPages, newPage, onPageChange);
        };

        renderPagination(`${page}-pagination`, state.pagination.totalPages, 1, onPageChange);
    }

    function renderTableBody(tbody, data, regionMode) {
        if (!tbody) return;
        if (regionMode) {
            tbody.innerHTML = data.map(item => {
                const displayName = getDisplayName(item);
                return `<tr>
                    <td class="rank-cell">${item.displayRank || item.rank}</td>
                    <td>${displayName}</td>
                    <td>${item.province || ''}</td>
                    <td>${item.city || ''}</td>
                    <td>${formatResult(item.result)}</td>
                    <td>${item.competition || ''}</td>
                    <td>${item.wcaid}</td>
                </tr>`;
            }).join('');
        } else {
            tbody.innerHTML = data.map(item => {
                const displayName = getDisplayName(item);
                return `
                <tr>
                    <td class="rank-cell">${item.displayRank || item.rank}</td>
                    <td>${displayName}</td>
                    <td>${item.country}</td>
                    <td>${formatResult(item.result)}</td>
                    <td>${item.competition || ''}</td>
                    <td>${item.wcaid}</td>
                </tr>
            `}).join('');
        }
    }

    function showTooltip(e) {
        e.preventDefault();
        const icon = e.currentTarget;
        icon.classList.add('active');
        if (state.tooltipTimer) clearTimeout(state.tooltipTimer);
        state.tooltipTimer = setTimeout(() => {
            icon.classList.remove('active');
        }, 8000);
    }

    window.addEventListener('load', async () => {
        const menuIcon = document.getElementById('mobile-menu-icon');
        const mobileNav = document.getElementById('mobile-nav');
        menuIcon.addEventListener('click', () => mobileNav.classList.toggle('show'));
        mobileNav.innerHTML = `
            <a href="#home" class="nav-item">首页</a>
            <a href="#season" class="nav-item">赛季排名</a>
            <a href="#active" class="nav-item">现役排名</a>
            <a href="#region" class="nav-item">省市排名</a>
            <a href="#comprehensive" class="nav-item">综合排名</a>
            <a href="#record" class="nav-item">省市纪录</a>
        `;
        mobileNav.querySelectorAll('a').forEach(a => a.addEventListener('click', () => mobileNav.classList.remove('show')));

        function handleHash() {
            const hash = window.location.hash.slice(1) || 'home';
            loadPage(hash);
        }
        window.addEventListener('hashchange', handleHash);
        handleHash();
    });
</script>
</body>
</html>
